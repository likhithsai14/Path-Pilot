<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profile Settings</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{
font-family:'Inter',sans-serif;
}

body{
background:linear-gradient(135deg,#eef2ff,#f8fafc);
min-height:100vh;
padding:24px;
}

.profile-wrap{
max-width:620px;
margin:0 auto;
}

.profile-card{
background:white;
border-radius:14px;
padding:28px;
box-shadow:0 8px 24px rgba(0,0,0,0.08);
border:1px solid #e5e7eb;
}

.title{
font-size:22px;
font-weight:700;
color:#111827;
margin-bottom:6px;
}

.subtitle{
font-size:13px;
color:#6b7280;
margin-bottom:22px;
}

.form-label{
font-size:12px;
font-weight:600;
text-transform:uppercase;
color:#374151;
letter-spacing:0.4px;
}

.form-control{
font-size:14px;
padding:10px 12px;
border:2px solid #e5e7eb;
border-radius:8px;
}

.form-control:focus{
border-color:#4f46e5;
box-shadow:0 0 0 3px rgba(79,70,229,0.12);
}

.actions{
display:flex;
gap:10px;
margin-top:18px;
}

.btn-save{
background:#4f46e5;
color:white;
}

.btn-save:hover{
background:#4338ca;
color:white;
}

.note{
font-size:12px;
color:#6b7280;
margin-top:10px;
}
</style>
</head>

<body>
<div class="profile-wrap">
<div class="profile-card">
<div class="title">Profile Settings</div>
<div class="subtitle">Update your student/contributor profile details.</div>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
  {% for category, msg in messages %}
  <div class="alert {% if category == 'success' %}alert-success{% else %}alert-danger{% endif %}" role="alert">
    {{ msg }}
  </div>
  {% endfor %}
{% endif %}
{% endwith %}

<form method="POST">
  <div class="mb-3">
    <label class="form-label">Name *</label>
    <input type="text" name="full_name" class="form-control" value="{{ full_name }}" required>
  </div>

  <div class="mb-3">
    <label class="form-label">College *</label>
    <input type="text" name="college" class="form-control" value="{{ college }}" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Class (Optional)</label>
    <input type="text" name="class_name" class="form-control" value="{{ class_name }}" placeholder="Example: CSE-A / 3rd Year">
  </div>

  <div class="actions">
    <button type="submit" class="btn btn-save">Save Profile</button>
    <a href="/dashboard" class="btn btn-secondary">Back</a>
  </div>
</form>

<div class="note">Logged in as: {{ user }}</div>
</div>
</div>
</body>
</html>
