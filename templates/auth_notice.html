<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Manrope', sans-serif;
            background: linear-gradient(180deg, #0b2545 0%, #13315c 55%, #102f57 100%);
        }

        .notice-card {
            width: min(460px, 100%);
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.24);
            backdrop-filter: blur(8px);
            box-shadow: 0 18px 34px rgba(2,12,27,0.34);
            border-radius: 16px;
            padding: 30px 26px;
            color: #f4f8ff;
            text-align: center;
        }

        .notice-icon {
            font-size: 30px;
            margin-bottom: 12px;
        }

        .notice-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -0.2px;
        }

        .notice-text {
            font-size: 14px;
            color: #d7e5f5;
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .btn-cta {
            background: linear-gradient(135deg, #14b8a6, #0f766e);
            border: none;
            color: #ffffff;
            font-weight: 700;
            font-size: 13px;
            padding: 10px 18px;
            border-radius: 10px;
            text-decoration: none;
            display: inline-block;
        }

        .btn-cta:hover {
            filter: brightness(1.06);
        }
    </style>
</head>
<body>
    <div class="notice-card">
        <div class="notice-icon">✅</div>
        <div class="notice-title">{{ title }}</div>
        <div class="notice-text">{{ message }}</div>
        <a href="{{ cta_link }}" class="btn-cta">{{ cta_text }}</a>
    </div>
</body>
</html>
