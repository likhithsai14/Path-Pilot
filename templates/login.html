<!DOCTYPE html>
<html>
<head>
<title>{{ role.capitalize() }} Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root{
--hero-start:#0b2545;
--hero-end:#13315c;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(180deg,var(--hero-start) 0%, var(--hero-end) 60%, #102f57 100%);
position:relative;
overflow:hidden;
}

body::before{
content:"";
position:absolute;
inset:-20% -10% auto -10%;
height:220px;
background:radial-gradient(circle at 20% 50%, rgba(20,184,166,0.24), transparent 45%),
radial-gradient(circle at 70% 30%, rgba(56,189,248,0.18), transparent 40%);
animation:driftGlow 9s ease-in-out infinite alternate;
pointer-events:none;
}

.floating-ball{
position:absolute;
border-radius:999px;
opacity:0.35;
z-index:1;
}

.ball-a{
width:180px;
height:180px;
background:#14b8a6;
top:14%;
right:12%;
animation:floatY 7s ease-in-out infinite;
}

.ball-b{
width:110px;
height:110px;
background:#f59e0b;
bottom:16%;
right:25%;
animation:floatY 6.5s ease-in-out infinite reverse;
}

.ball-c{
width:150px;
height:150px;
background:#38bdf8;
top:58%;
left:10%;
animation:floatY 8s ease-in-out infinite;
}

.box{
background:rgba(255,255,255,0.10);
backdrop-filter:blur(10px);
padding:40px;
border-radius:15px;
width:360px;
box-shadow:0 14px 34px rgba(2,12,27,0.38);
position:relative;
z-index:2;
border:1px solid rgba(255,255,255,0.28);
}

.box h2{
font-size:20px;
font-weight:700;
margin-bottom:25px;
color:#f4f8ff;
}

.box p{
font-size:12px;
color:#d7e5f5;
}

.box a{
color:#99f6e4;
font-weight:700;
text-decoration:none;
}

.box a:hover{
text-decoration:underline;
}

.form-control{
font-size:13px;
background:rgba(255,255,255,0.92);
border:1px solid rgba(255,255,255,0.4);
}

.password-wrap{
position:relative;
}

.password-wrap .form-control{
padding-right:44px;
}

.toggle-password{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
border:none;
background:transparent;
font-size:12px;
font-weight:700;
cursor:pointer;
color:#334155;
line-height:1;
}

.btn{
font-size:13px;
font-weight:700;
border:none;
background:linear-gradient(135deg,#0ea5a4,#115e59);
}

.btn:hover{
filter:brightness(1.05);
}

@keyframes driftGlow{
0%{transform:translateX(-3%) translateY(0);}
100%{transform:translateX(3%) translateY(6px);}
}

@keyframes floatY{
0%{transform:translateY(0px);}
50%{transform:translateY(-18px);}
100%{transform:translateY(0px);}
}
</style>
</head>

<body>

<div class="floating-ball ball-a"></div>
<div class="floating-ball ball-b"></div>
<div class="floating-ball ball-c"></div>

<div class="box text-center">
<h2>{{ role.capitalize() }} Login</h2>

<form method="POST">
<input type="text" name="username" class="form-control mb-3" placeholder="Email" required>
<div class="password-wrap mb-3">
<input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
<button type="button" class="toggle-password" data-target="password" aria-label="Show password">Show</button>
</div>
<button class="btn btn-primary w-100">Login</button>
</form>

{% if role != "admin" %}
<p class="mt-3">
Don't have an account?
<a href="{{ url_for('register', role=role) }}">Register</a>
</p>
{% endif %}

</div>

<script>
document.querySelectorAll('.toggle-password').forEach((btn) => {
	btn.addEventListener('click', () => {
		const input = document.getElementById(btn.dataset.target);
		if (!input) return;
		const showing = input.type === 'text';
		input.type = showing ? 'password' : 'text';
		btn.textContent = showing ? 'Show' : 'Hide';
		btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
	});
});
</script>

</body>
</html>
