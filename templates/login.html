<!DOCTYPE html>
<html>
<head>
<title>{{ role.capitalize() }} Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#001f3f,#6a0dad);
}
.box{
background:white;
padding:40px;
border-radius:15px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="box text-center">
<h2>{{ role.capitalize() }} Login</h2>

<form method="POST">
<input type="text" name="username" class="form-control mb-3" placeholder="Email" required>
<input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
<button class="btn btn-primary w-100">Login</button>
</form>

{% if role != "admin" %}
<p class="mt-3">
Don't have an account?
<a href="{{ url_for('register', role=role) }}">Register</a>
</p>
{% endif %}

</div>

</body>
</html>
