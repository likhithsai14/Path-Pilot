<!DOCTYPE html>
<html>
<head>
    <title>{{ role.capitalize() }} Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #001f3f, #4b0082);
        }

        .register-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        .register-box h3 {
            margin-bottom: 25px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="register-box">

    <h3>{{ role.capitalize() }} Register</h3>

    <form method="POST">

        <input type="text" name="username" class="form-control mb-3"
               placeholder="Email" required>

        <input type="password" name="password" class="form-control mb-3"
               placeholder="Password" required>

        <!-- 👇 THIS PART SHOWS ONLY FOR CONTRIBUTOR -->
        {% if role == "contributor" %}
        <select name="designation" class="form-control mb-3" required>
            <option value="">Select Type</option>
            <option value="Final Year">Final Year</option>
            <option value="Alumni">Alumni</option>
        </select>
        {% endif %}

        <button class="btn btn-primary w-100">Register</button>

    </form>

    <p class="mt-3">
        Already have an account?
        <a href="{{ url_for('login', role=role) }}">Login</a>
    </p>

</div>

</body>
</html>
