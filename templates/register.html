<!DOCTYPE html>
<html>
<head>
    <title>{{ role.capitalize() }} Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #0b2545 0%, #13315c 55%, #102f57 100%);
        }

        .register-box {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.22);
            backdrop-filter: blur(8px);
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 16px 30px rgba(2,12,27,0.3);
            text-align: center;
            color: #f4f8ff;
        }

        .register-box h3 {
            font-size: 20px;
            margin-bottom: 25px;
            font-weight: bold;
        }
        
        .register-box p {
            font-size: 12px;
            color: #d7e5f5;
        }

        .register-box a {
            color: #8ee7e6;
        }
        
        .form-control {
            font-size: 13px;
            background: rgba(255,255,255,0.92);
            border: 1px solid rgba(255,255,255,0.8);
        }

        .password-wrap {
            position: relative;
        }

        .password-wrap .form-control {
            padding-right: 44px;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            color: #334155;
            line-height: 1;
        }

        .btn-primary {
            background: linear-gradient(135deg, #14b8a6, #0f766e);
            border: none;
            font-weight: 700;
        }

        .btn-primary:hover {
            filter: brightness(1.06);
        }
        
        .btn {
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="register-box">

    <h3>{{ role.capitalize() }} Register</h3>

    <form method="POST">

        <input type="text" name="username" class="form-control mb-3"
               placeholder="Email" required>

         <div class="password-wrap mb-3">
             <input type="password" id="password" name="password" class="form-control"
                 placeholder="Password" required>
            <button type="button" class="toggle-password" data-target="password" aria-label="Show password">Show</button>
         </div>

        <!-- 👇 THIS PART SHOWS ONLY FOR CONTRIBUTOR -->
        {% if role == "contributor" %}
        <select name="designation" class="form-control mb-3" required>
            <option value="">Select Type</option>
            <option value="Final Year">Final Year</option>
            <option value="Alumni">Alumni</option>
        </select>
        {% endif %}

        <button class="btn btn-primary w-100">Register</button>

    </form>

    <p class="mt-3">
        Already have an account?
        <a href="{{ url_for('login', role=role) }}">Login</a>
    </p>

</div>

<script>
document.querySelectorAll('.toggle-password').forEach((btn) => {
    btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        if (!input) return;
        const showing = input.type === 'text';
        input.type = showing ? 'password' : 'text';
        btn.textContent = showing ? 'Show' : 'Hide';
        btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
    });
});
</script>

</body>
</html>
