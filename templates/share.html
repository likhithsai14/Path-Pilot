<!DOCTYPE html>
<html>

<head>
<title>Share Experience</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Share Interview Experience</h2>

<form method="POST">

<input name="company" class="form-control mb-3" placeholder="Company" required>

<input name="job_role" class="form-control mb-3" placeholder="Role" required>

<input name="year" class="form-control mb-3" placeholder="Year" required>

<textarea name="description" class="form-control mb-3" placeholder="Describe interview process" required></textarea>

<button class="btn btn-dark">Post Experience</button>

<a href="/dashboard" class="btn btn-secondary">Back</a>

</form>

</div>

</body>
</html>
